- name: Clone templates
  ansible.builtin.git:
    repo: "{{ project_templates_git_url }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.templates"
    version: main

- name: Install mkn
  ansible.builtin.copy:
    src: mkn
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/mkn"
    mode: "0755"

- name: Add templates path to bashrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
    block: "{{ lookup('file', 'bashrc') }}"
    marker: "# {mark} ANSIBLE PROJECT TEMPLATES BLOCK"
    create: true
    mode: "0644"
  tags:
    - user_config
