- name: Disable sudo password for user
  become: true
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/{{ ansible_facts['user_id'] }}"
    line: "{{ ansible_facts['user_id'] }} ALL=(ALL) NOPASSWD: ALL"
    create: true
    owner: root
    group: root
    mode: "0644"
  tags:
    - user_config
