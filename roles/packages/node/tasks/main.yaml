- name: Install NodeJS Archlinux
  when: ansible_facts["distribution"] == "Archlinux"
  block:
    - name: Install packages
      become: true
      ansible.builtin.package:
        state: present
        name:
          - nodejs
          - npm
          - yarn

- name: Install NodeJS Via NVM
  when: ansible_facts["distribution"] == "Ubuntu"
  block:
    - name: Download nvm installer
      ansible.builtin.get_url:
        url: "{{ nvm_installer_url }}"
        dest: "{{ nvm_installer_script }}"
        mode: "0700"
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"

    - name: Install NVM
      ansible.builtin.shell: "{{ nvm_installer_script }}"
      args:
        executable: /bin/bash
        creates: "{{ ansible_facts['env']['HOME'] }}/.nvm"

    - name: Install Node
      ansible.builtin.shell: "source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh && nvm install {{ node_version }}"
      args:
        executable: /bin/bash
        creates: "{{ ansible_facts['env']['HOME'] }}/.nvm/versions/node"

    - name: Set Default Version
      ansible.builtin.shell: "source {{ ansible_facts['env']['HOME'] }}/.nvm/nvm.sh && nvm alias default {{ node_version }}"
      args:
        executable: /bin/bash
        creates: "{{ ansible_facts['env']['HOME'] }}/.nvm/versions/node"
