- name: Install System
  hosts: server
  become_exe: sudo.ws
  roles:
    - server/packages

    - packages/git
    - packages/docker
    - packages/python
    - packages/bash

    - server/ddns
    # TODO this does not handle mounting array properly
    # - server/raid
    - server/docker

    - server/user/github
    - server/user/colleen
    - server/user/minecraft

    - backup/server
    # - mail_system_report

    - role: bash_config
      tags:
        - user_config

  vars:
    raid_user: data
    ddclient_zone: twhps.net
    ddclient_hosts:
      # - twhps.net
      # - api.twhps.net
      - home.twhps.net
      # - public.twhps.net
      # - souprfood.com

    # Get ssh key from previous localhost play
    # restic_public_key: "{{ lookup('file', hostvars['localhost']['ansible_user_dir'] ~ '/.ssh/id_rsa.pub') }}"

    clean_backups_hosts:
      - tom-k-pc
      - tom-k-t470p
